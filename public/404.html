<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>CW Cycle Count</title>
    <script>
      // GitHub Pages SPA redirect
      // Converts /cw-cycle-count-v2/session/123 into
      // /cw-cycle-count-v2/?/session/123
      // index.html then picks it up and uses replaceState
      var pathSegmentsToKeep = 1; // keep /cw-cycle-count-v2/
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
